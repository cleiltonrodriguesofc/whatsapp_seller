version: '3.8'

services:
  app:
    build: .
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE}
    restart: unless-stopped

  # You can add the Evolution API service here if you want to run it together
  # evolution-api:
  #   image: atendere/evolution-api:latest
  #   ...
