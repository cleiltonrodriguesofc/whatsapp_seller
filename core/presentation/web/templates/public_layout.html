<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} | 🚀 WhatSeller Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --background: #0b0c14;
            --surface: #161827;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --p-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--background);
            color: var(--text);
            line-height: 1.6;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }
        
        /* Nav */
        nav {
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 3rem;
        }
        .nav-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.25rem; font-weight: 800; text-decoration: none; color: white; }
        .logo span { color: var(--primary); }
        .btn-back { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .btn-back:hover { color: white; }

        /* Content */
        .content-area { padding-bottom: 5rem; min-height: 70vh; }
        .page-header { margin-bottom: 3rem; text-align: center; }
        .page-title { font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem; }
        .page-subtitle { color: var(--text-muted); font-size: 1.1rem; }
        
        .legal-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        /* Footer */
        footer {
            padding: 4rem 0;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .footer-links { display: flex; justify-content: center; gap: 2rem; margin-top: 1.5rem; }
        .footer-links a { color: inherit; text-decoration: none; transition: color 0.1s; }
        .footer-links a:hover { color: white; }

        /* Spacing for sections */
        section { margin-bottom: 2.5rem; }
        h3 { color: var(--primary); margin-bottom: 1rem; font-size: 1.4rem; font-weight: 700; }
        p { margin-bottom: 1rem; color: rgba(255,255,255,0.8); }
        
        @media (max-width: 640px) {
            .page-title { font-size: 2rem; }
            .legal-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container nav-content">
            <a href="/" class="logo">🚀 What<span>Seller</span> Pro</a>
            <a href="/" class="btn-back">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Voltar para o Início
            </a>
        </div>
    </nav>

    <main class="container content-area">
        <header class="page-header">
            <h1 class="page-title">{% block page_title %}{% endblock %}</h1>
            <p class="page-subtitle">{% block page_subtitle %}{% endblock %}</p>
        </header>

        <div class="legal-card">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 <strong>🚀 WhatSeller Pro</strong>. Todos os direitos reservados.</p>
            <div class="footer-links">
                <a href="/terms">Termos de Uso</a>
                <a href="/privacy">Privacidade</a>
                <a href="/docs">Documentação</a>
                <a href="/login">Entrar</a>
            </div>
        </div>
    </footer>
</body>
</html>
