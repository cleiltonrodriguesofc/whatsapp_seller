<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} | 🚀 WhatSeller Pro</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --background: #06070a;
            --surface: rgba(22, 24, 39, 0.6);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--background);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.05) 0px, transparent 50%);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }
        
        /* Nav */
        nav {
            padding: 1.5rem 0;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            margin-bottom: 3rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.25rem; font-weight: 800; text-decoration: none; color: white; display: flex; align-items: center; gap: 0.5rem; }
        .logo span { color: var(--primary); }
        .btn-back { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; transition: color 0.2s; }
        .btn-back:hover { color: white; }
 
        /* Content */
        .content-area { padding-bottom: 5rem; min-height: 60vh; }
        .page-header { margin-bottom: 3.5rem; text-align: center; }
        .page-title { font-size: 3rem; font-weight: 800; margin-bottom: 1rem; color: white; letter-spacing: -1px; }
        .page-subtitle { color: var(--text-muted); font-size: 1.1rem; }
        
        .legal-card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 4rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Footer */
        footer {
            padding: 4rem 0;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .footer-links { display: flex; justify-content: center; gap: 2rem; margin-top: 1.5rem; }
        .footer-links a { color: inherit; text-decoration: none; transition: color 0.1s; }
        .footer-links a:hover { color: white; }

        /* Spacing for sections */
        section { margin-bottom: 2.5rem; }
        h3 { color: var(--primary); margin-bottom: 1rem; font-size: 1.4rem; font-weight: 700; }
        p { margin-bottom: 1rem; color: rgba(255,255,255,0.8); }
        
        @media (max-width: 640px) {
            .page-title { font-size: 2rem; }
            .legal-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container nav-content">
            <a href="/" class="logo"><span>🚀</span> <strong style="font-weight: 700;">What<span style="background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Seller</span> Pro</strong></a>
            <a href="/" class="btn-back">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Voltar para o Início
            </a>
        </div>
    </nav>

    <main class="container content-area">
        <header class="page-header">
            <h1 class="page-title">{% block page_title %}{% endblock %}</h1>
        </header>

        <div class="legal-card">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer>
        <div class="container">
            <div style="margin-bottom: 1.5rem;">
                <span style="font-size: 1.1rem; font-weight: 700;">What<span style="background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Seller</span> Pro</span>
            </div>
            <div class="footer-links">
                <a href="/">Início</a>
                <a href="/docs">Documentação</a>
                <a href="/terms">Termos</a>
                <a href="/privacy">Privacidade</a>
            </div>
            <p style="margin-top: 2rem; opacity: 0.5; font-size: 0.75rem;">© 2026 WhatSeller Pro. Todos os direitos reservados.</p>
        </div>
    </footer>

</body>
</html>
