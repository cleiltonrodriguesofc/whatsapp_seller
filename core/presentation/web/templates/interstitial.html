<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando para a Oferta...</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent: #6366f1;
        }
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; text-align: center; overflow: hidden;
        }
        .container {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 2.5rem; border-radius: 20px; max-width: 400px; width: 90%;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .avatar {
            width: 80px; height: 80px; border-radius: 50%;
            object-fit: cover; border: 3px solid var(--accent);
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(99,102,241, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(99,102,241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99,102,241, 0); }
        }
        h2 { margin: 0 0 0.5rem 0; font-size: 1.4rem; font-weight: 600; }
        p { color: #94a3b8; font-size: 0.95rem; margin-bottom: 1.5rem; line-height: 1.5; }
        
        .loader {
            width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.1);
            border-bottom-color: var(--accent); border-radius: 50%;
            display: inline-block; box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .btn-manual {
            display: inline-block; margin-top: 1rem;
            padding: 0.6rem 1.5rem; background: rgba(255,255,255,0.1);
            color: #cbd5e1; text-decoration: none; border-radius: 8px;
            font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s;
        }
        .btn-manual:hover { background: rgba(255,255,255,0.15); color: white; }
    </style>
</head>
<body>

    <div class="container">
        {% if owner_avatar %}
        <img src="data:image/jpeg;base64,{{ owner_avatar }}" alt="Loja" class="avatar">
        {% else %}
        <div class="avatar" style="display:flex;align-items:center;justify-content:center;font-size:2rem;background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);">🛍️</div>
        {% endif %}
        
        <h2>Preparando sua oferta...</h2>
        <p>Você está sendo redirecionado de forma segura para o {{ store_label }}.</p>
        
        <span class="loader"></span>
        
        <br>
        <a href="{{ destination_url }}" class="btn-manual">Ir para a loja agora</a>
    </div>

    <script>
        // Redirect automatically after 2 seconds
        setTimeout(function() {
            window.location.href = "{{ destination_url | safe }}";
        }, 2000);
    </script>
</body>
</html>
