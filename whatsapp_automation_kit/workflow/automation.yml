name: WhatsApp Automation Trigger

on:
  schedule:
    # Example: Every day at 09:00 BRT (12:00 UTC)
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      message:
        description: 'Manual message'
        required: false

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Webhook
        run: |
          # The JID of the target group
          TARGET_JID="120363123456@g.us"
          MSG="Olá pessoal! Confira as ofertas de hoje."
          
          curl -s -i -G "https://YOUR-APP-URL.com/api/v1/whatsapp/trigger/" \
            --data-urlencode "action=campaign" \
            --data-urlencode "jid=$TARGET_JID" \
            --data-urlencode "message=$MSG" \
            -H "X-Trigger-Token: ${{ secrets.TRIGGER_TOKEN }}"
