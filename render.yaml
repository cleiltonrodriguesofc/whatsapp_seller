services:
  - type: web
    name: whatsapp-seller-pro
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: whatsapp-agent-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
      - key: EVOLUTION_API_URL
        sync: false
      - key: TRIGGER_TOKEN
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: BASE_URL
        sync: false

databases:
  - name: whatsapp-agent-db
    plan: free
