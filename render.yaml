services:
  - type: web
    name: whatsapp-seller-pro
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false  # set manually in render dashboard — points to supabase transaction pooler (port 6543)
      - key: OPENAI_API_KEY
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
      - key: EVOLUTION_API_URL
        sync: false
      - key: TRIGGER_TOKEN
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: BASE_URL
        sync: false
