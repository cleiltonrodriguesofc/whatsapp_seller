{% extends 'base.html' %}

{% block title %}Formulário de Grupo - WhatsApp Sales Agent{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h3>{{ title }}</h3>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="id_name" class="form-label">Nome do Grupo</label>
                {{ form.name.errors }}
                <input type="text" name="name" id="id_name" class="form-control {% if form.name.errors %}is-invalid{% endif %}" value="{{ form.name.value|default:'' }}" required>
            </div>
            
            <div class="mb-3">
                <label for="id_group_id" class="form-label">ID do Grupo</label>
                {{ form.group_id.errors }}
                <input type="text" name="group_id" id="id_group_id" class="form-control {% if form.group_id.errors %}is-invalid{% endif %}" value="{{ form.group_id.value|default:'' }}" required>
                <div class="form-text">ID único do grupo no WhatsApp (obtido através da API)</div>
            </div>
            
            <div class="mb-3">
                <div class="form-check">
                    <input type="checkbox" name="is_allowed" id="id_is_allowed" class="form-check-input" {% if form.is_allowed.value %}checked{% endif %}>
                    <label class="form-check-label" for="id_is_allowed">Permitir interações com este grupo</label>
                </div>
            </div>
            
            <div class="d-flex justify-content-between mt-4">
                <a href="{% url 'core:group_list' %}" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left"></i> Voltar
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Salvar
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
